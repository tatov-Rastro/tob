
name: TOB · P1 (08·13·18 CL)

# P1 = la costura + los 6 detectores. Corre SOLO en los horarios editoriales.
# 08:00 / 13:00 / 18:00 hora de Chile (UTC-4) = 12 / 17 / 22 UTC.
on:
  schedule:
    - cron: "0 12,17,22 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ "ingesta_gondola.py" ]

permissions:
  contents: write

concurrency:
  group: gondola
  cancel-in-progress: false

jobs:
  p1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Correr P1 (costura + detectores + titular creativo)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ingesta_gondola.py p1
      - name: Commitear gondola.json
        run: |
          git config user.name  "TOB-gondola"
          git config user.email "gondola@tob.bot"
          git add -f gondola.json
          if git diff --staged --quiet; then echo "sin cambios"; exit 0; fi
          git commit -m "P1: corrida"
          git pull --rebase || true
          git push
